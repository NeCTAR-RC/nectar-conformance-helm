# Defaults shared by both tiers. Override per tier with values-prod.yaml / values-test.yaml.

image:
  repository: registry.rc.nectar.org.au/nectar/nectar-conformance
  tag: "" # defaults to the chart appVersion
  pullPolicy: IfNotPresent

# Which tier this deployment represents. All discovered sites are folded as this tier.
tier: prod

puppetdb:
  # The tier's PuppetDB endpoint (plain HTTP, no token). REQUIRED.
  baseUrl: "http://localhost:8080"

# Site ids this deployment evaluates, as a flat list. The chart nests this under the
# configured `tier` (above) when it writes config.yaml, so list each site once, e.g.:
#   sites:
#     - adelaide
#     - ardc
#     - melbourne
# Leave empty ([]) to evaluate every environment PuppetDB knows about (discovery); a
# non-empty list restricts evaluation to exactly those sites. The real per-tier lists
# live in values-prod.yaml / values-test.yaml.
sites: []

# The conformance check data (definitions + changelog) lives in the
# nectar-conformance-checks repo, not in the image, so the conformance schedule can change
# without a new image. git-sync clones it into a shared volume that both pods read: an
# init container for the CronJob (fresh every run) and a sidecar for the web pod (periodic
# pull, so the dashboard's version/changes views stay current without a restart).
checks:
  # Where the synced checkout is mounted in both pods. The tool reads <mountPath>/current
  # (git-sync's stable symlink to the working tree).
  mountPath: /checks
  git:
    enabled: true
    # Clone URL for nectar-conformance-checks. REQUIRED when enabled. The repo is private, so
    # this is an SSH URL and an SSH deploy key must be supplied (Vault injection by default;
    # see vault below).
    repo: "git@git.rc.nectar.org.au:internal/nectar-conformance-checks.git"
    ref: master
    depth: 1
    # Web sidecar pull interval (the CronJob init clone ignores this; it runs once).
    period: 1m
    maxFailures: 3
    image: registry.k8s.io/git-sync/git-sync:v4.7.1
    # Path git-sync reads the SSH private key from. With Vault injection (below) the Vault
    # Agent renders the key here, under the shared /vault/secrets mount.
    sshKeyFile: /vault/secrets/ssh
    # Deliver the SSH deploy key with the Vault Agent Injector (no Kubernetes Secret). The
    # agent renders the private key into the pod at sshKeyFile, and git-sync reads it there.
    vault:
      enabled: true
      # Vault Kubernetes auth role bound to the pods' ServiceAccount. REQUIRED when enabled.
      role: "k8s"
      # KV v2 path holding the deploy key (note the /data/ segment), and the field within it.
      secretPath: "secret/data/k8s/nectar-conformance/nectar-conformance/checks-deploy-key"
      secretKey: ssh
      # Optional: override the rendered Vault Agent template (defaults to a KV v2 read of
      # secretKey at secretPath). Set this if your secret's shape is non-standard.
      template: ""
      # Optional: extra vault.hashicorp.com/* annotations merged onto both pods.
      annotations: {}
    # Fallback: mount an existing Kubernetes Secret holding the deploy key under key "ssh"
    # instead of using Vault. Leave empty when vault.enabled is true.
    secretName: ""
    resources:
      requests:
        cpu: 100m
        memory: 32Mi
      limits:
        cpu: 500m
        memory: 64Mi

# When the refresh CronJob runs (cluster timezone). Default: hourly.
refreshSchedule: "0 * * * *"

# Mount point of the shared reports volume, in both pods.
reportsDir: /var/lib/nectar-conformance

replicas: 1

# Pod- and container-level security contexts. The defaults satisfy the "Restricted"
# Pod Security Standard, so the chart deploys cleanly into a namespace labelled
# pod-security.kubernetes.io/enforce=restricted.
# https://kubernetes.io/docs/concepts/security/pod-security-standards/
# fsGroup lets the non-root user write to the RWX reports volume (CronJob writes, web reads).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  # runAsUser is set explicitly here (matching podSecurityContext) so the Vault Agent
  # Injector's agent-run-as-same-user can read the UID from the first app container.
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

reports:
  pvc:
    # Must be a ReadWriteMany-capable storage class (CronJob writes, web reads).
    storageClassName: ""
    size: 1Gi
    accessModes:
      - ReadWriteMany

service:
  port: 80

# Gateway API HTTPRoute (not Ingress).
httproute:
  enabled: true
  parentRefs:
    - name: nectar-gateway
      # namespace: gateway-system
  hostnames: []

# Restrict the CronJob's egress. It reaches PuppetDB plus the git host (the git-sync init
# container clones the checks repo). The web pod is not selected by this policy.
networkPolicy:
  enabled: false
  puppetdb:
    cidrs: []
    ports:
      - 8080
  # Egress to the nectar-conformance-checks git host. Set cidrs to the Gitea host(s); the
  # port is 22 for SSH clones (match checks.git.repo).
  checksGit:
    cidrs: []
    ports:
      - 22
  # Egress to Vault so the injected vault-agent-init can fetch the deploy key. Set cidrs to
  # the Vault host(s); port is 8200 by default (use 443 if Vault is fronted by TLS on 443).
  vault:
    cidrs: []
    ports:
      - 8200

resources:
  web:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi
  refresh:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Extra keys merged into config.yaml at its root (e.g. site_environment overrides).
extraConfig: {}

nameOverride: ""
fullnameOverride: ""
